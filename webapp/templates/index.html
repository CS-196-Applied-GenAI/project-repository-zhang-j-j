<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickEDA Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <h1>QuickEDA</h1>
        <p class="subtitle">Minimal web wrapper for upload, analysis, and report export.</p>

        <p id="error-message" class="error hidden" role="alert"></p>

        <section id="upload-view" class="panel">
            <h2>1. Upload Dataset</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <label for="dataset-file">CSV or Parquet file</label>
                <input id="dataset-file" name="file" type="file" accept=".csv,.parquet" required>
                <button id="upload-button" type="submit">Upload</button>
            </form>
        </section>

        <section id="config-view" class="panel hidden">
            <h2>2. Analysis Options</h2>
            <form id="analyze-form">
                <label for="target">Target column</label>
                <select id="target" name="target">
                    <option value="">(none - unsupervised)</option>
                </select>

                <label for="problem-type">Problem type</label>
                <select id="problem-type" name="problem_type">
                    <option value="">Auto-detect</option>
                    <option value="classification">Classification</option>
                    <option value="regression">Regression</option>
                </select>

                <label for="random-seed">Random seed</label>
                <input id="random-seed" name="random_seed" type="number" value="42" required>

                <label for="split-ratio">Train/test split ratio</label>
                <input id="split-ratio" name="train_test_split_ratio" type="number" step="0.05" min="0.1" max="0.95" value="0.8" required>

                <label for="num-top-features">Number of top features</label>
                <input id="num-top-features" name="num_top_features" type="number" min="1" value="10" required>

                <label for="missing-threshold">Missing value threshold</label>
                <input id="missing-threshold" name="missing_threshold" type="number" step="0.05" min="0.0" max="1.0" value="0.5" required>

                <button id="analyze-button" type="submit">Run Analysis</button>
            </form>
        </section>

        <section id="progress-view" class="panel hidden">
            <h2>3. Progress</h2>
            <div class="status-row">
                <span class="spinner" aria-hidden="true"></span>
                <span id="status-text">Waiting to start...</span>
            </div>
        </section>

        <section id="result-view" class="panel hidden">
            <h2>4. Report</h2>
            <div class="actions">
                <a id="download-link" class="button-link" href="#" download>Download Report</a>
                <button id="start-over" type="button">Start Over</button>
            </div>
            <iframe id="report-frame" title="QuickEDA report preview"></iframe>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
